<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title%}
        <title>{{ title }}</title>
    {% else %}
        <title>My Flask App</title>
    {% endif %}
</head>
<body>
    <h2>Blog:
         <a href="{{ url_for('index') }}">Home</a>
         <a href="{{ url_for('login') }}">Login</a>
    </h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                {{ message }}
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content%}
    {% endblock %}
</body>
</html>
